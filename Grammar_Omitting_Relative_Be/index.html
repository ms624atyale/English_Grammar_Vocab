            color: #1e3799;
        }

            font-size: 0.95rem;
            font-weight: 700;

        }

        .overall-progress {
            background: #f0f7ff;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 25px;

            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #54a0ff, #1e3799);
            height: 100%;
            width: 0%;

            border-radius: 10px;
        }

        }

            border-radius: 22px;
            padding: 20px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 5px 0px #f1f2f6;
        }

        .vocab-card:hover {
            transform: translateY(-4px);
            border-color: #ffeaa7;
            box-shadow: 0 9px 0px #ffeaa7;
            background: #fffdf9;
        }

        .vocab-card.completed {
            border-color: #e3fafc;
            background: #f8feff;
            box-shadow: 0 5px 0px #c5f6fa;
        }

        .vocab-card.completed .check-icon {
            background: #2ed573;
            color: white;
            border-color: #2ed573;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

            align-items: center;
